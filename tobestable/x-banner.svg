  <text x="96" y="205"><tspan fill="#00d68f">&#10003;</tspan> supply curve <tspan fill="#00d68f">hard-coded, immutable</tspan></text>
  <text x="96" y="235"><tspan fill="#00d68f">&#10003;</tspan> admin mint key <tspan fill="#00d68f">none</tspan></text>
  <text x="96" y="265"><tspan fill="#00d68f">&#10003;</tspan> governance <tspan fill="#00d68f">2-of-3 DAO multisig</tspan></text>
  <text x="96" y="295">$ <tspan fill="#e8ecf1">status: ready</tspan><tspan fill="#00e8c6">_</tspan></text>
