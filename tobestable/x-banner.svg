<text x="905" y="298" font-family="JetBrains Mono, Consolas, monospace" font-size="24" fill="#8b97ab" letter-spacing="1.5">BUILT TO BE STABLE</text>
<text x="905" y="400" font-family="JetBrains Mono, Consolas, monospace" font-weight="700" font-size="32" fill="#00e8c6">tobestable.com</text>
