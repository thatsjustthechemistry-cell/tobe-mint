<rect width="1500" height="500" fill="#0a0b0f"/>

<rect x="60" y="60" width="1380" height="380" rx="10" fill="#0f1420" stroke="#1e2a3a" stroke-width="1.5"/>
<rect x="60" y="60" width="1380" height="42" rx="10" fill="#141a26"/>
<rect x="60" y="90" width="1380" height="12" fill="#141a26"/>
<circle cx="96" cy="81" r="7" fill="#ff5f57"/>
<circle cx="120" cy="81" r="7" fill="#febc2e"/>
<circle cx="144" cy="81" r="7" fill="#28c840"/>
<text x="750" y="86" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#6b7a90" text-anchor="middle">tobestable — boot.log</text>

<g font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#8b97ab">
  <text x="96" y="145"><tspan fill="#00d68f">&#10003;</tspan> 4 security audits <tspan fill="#00d68f">passed</tspan></text>
