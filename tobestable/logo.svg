<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffdd"/>
      <stop offset="40%" stop-color="#00e8c6"/>
      <stop offset="70%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#ff6bb5"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="#060810"/>

  <!-- Horizontal bar: 280 wide -->
  <rect x="116" y="116" width="280" height="56" rx="4" fill="url(#neon)"/>
  <!-- Vertical bar: 280 tall (same as horizontal width) -->
  <rect x="228" y="116" width="56" height="280" rx="4" fill="url(#neon)"/>
</svg>
